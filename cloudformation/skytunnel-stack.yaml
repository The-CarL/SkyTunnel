AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  SkyTunnel — Multi-protocol tunneling server (iodine DNS, hans ICMP, chisel HTTPS).
  Deploys a single EC2 instance with all three tunnel services, an Elastic IP,
  and Route 53 DNS records for tunnel subdomain delegation.

# ============================================================
# Parameters
# ============================================================
Parameters:
  DomainName:
    Type: String
    Description: Base domain name (e.g., example.com)
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-]*\.[a-zA-Z]{2,}$
    ConstraintDescription: Must be a valid domain name

  TunnelSubdomain:
    Type: String
    Default: t
    Description: >-
      Subdomain for DNS tunnel delegation (shorter = more payload per query).
      The full tunnel domain will be <TunnelSubdomain>.<DomainName>
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-]*$

  NsHostname:
    Type: String
    Default: ns-tunnel
    Description: >-
      Hostname for the A record pointing to the Elastic IP.
      The NS record for the tunnel subdomain will delegate to this hostname.
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-]*$

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone ID for the domain

  InstanceType:
    Type: String
    Default: t3.nano
    Description: EC2 instance type
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t4g.nano
      - t4g.micro
      - t4g.small

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name for SSH access

  SSHAllowCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to SSH into the instance
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  IodinePassword:
    Type: String
    NoEcho: true
    Description: Password for iodine DNS tunnel
    MinLength: 8

  HansPassword:
    Type: String
    NoEcho: true
    Description: Password for hans ICMP tunnel
    MinLength: 8

  ChiselAuth:
    Type: String
    NoEcho: true
    Description: 'Chisel authentication string (format: user:password)'
    AllowedPattern: ^[^:]+:.+$
    ConstraintDescription: Must be in user:password format

  IodineSubnet:
    Type: String
    Default: 10.53.0.1/24
    Description: Tunnel subnet for iodine (server gets this IP)

  HansSubnet:
    Type: String
    Default: 10.54.0.1
    Description: Tunnel IP for hans server

  EnableLetsEncrypt:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable Let's Encrypt TLS for chisel HTTPS tunnel

  LetsEncryptEmail:
    Type: String
    Default: ''
    Description: Email for Let's Encrypt registration (required if EnableLetsEncrypt is true)

# ============================================================
# Resources
# ============================================================
Resources:

  # --- VPC ---
  TunnelVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/24
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SkyTunnel-VPC
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation

  TunnelSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TunnelVPC
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: SkyTunnel-Subnet
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation

  TunnelIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SkyTunnel-IGW
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation

  TunnelIGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref TunnelVPC
      InternetGatewayId: !Ref TunnelIGW

  TunnelRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref TunnelVPC
      Tags:
        - Key: Name
          Value: SkyTunnel-RT
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation

  TunnelDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: TunnelIGWAttachment
    Properties:
      RouteTableId: !Ref TunnelRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref TunnelIGW

  TunnelSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref TunnelSubnet
      RouteTableId: !Ref TunnelRouteTable

  # --- Elastic IP ---
  TunnelEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: SkyTunnel-EIP
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation

  TunnelEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt TunnelEIP.AllocationId
      InstanceId: !Ref TunnelServer

  # --- Security Group ---
  TunnelSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SkyTunnel tunnel server security group
      VpcId: !Ref TunnelVPC
      Tags:
        - Key: Name
          Value: SkyTunnel-SG
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation

  # Separate ingress rules for auditability
  SGIngressSSH:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TunnelSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref SSHAllowCIDR
      Description: SSH access

  SGIngressDNS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TunnelSecurityGroup
      IpProtocol: udp
      FromPort: 53
      ToPort: 53
      CidrIp: 0.0.0.0/0
      Description: iodine DNS tunnel (UDP 53)

  SGIngressICMP:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TunnelSecurityGroup
      IpProtocol: icmp
      FromPort: -1
      ToPort: -1
      CidrIp: 0.0.0.0/0
      Description: hans ICMP tunnel

  SGIngressHTTPS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TunnelSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: chisel HTTPS tunnel

  SGIngressHTTP:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TunnelSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: 0.0.0.0/0
      Description: Certbot HTTP-01 validation

  # --- Route 53 DNS Records ---
  TunnelDNSRecords:
    Type: AWS::Route53::RecordSetGroup
    DependsOn: TunnelEIPAssociation
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        # A record: ns-tunnel.example.com -> Elastic IP
        - Name: !Sub '${NsHostname}.${DomainName}.'
          Type: A
          TTL: '300'
          ResourceRecords:
            - !Ref TunnelEIP

        # NS record: t.example.com -> ns-tunnel.example.com
        # This delegates DNS queries for the tunnel subdomain to our server
        - Name: !Sub '${TunnelSubdomain}.${DomainName}.'
          Type: NS
          TTL: '300'
          ResourceRecords:
            - !Sub '${NsHostname}.${DomainName}.'

  # --- EC2 Instance ---
  TunnelServer:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT20M
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref TunnelSubnet
      SecurityGroupIds:
        - !Ref TunnelSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: SkyTunnel
        - Key: Project
          Value: SkyTunnel
        - Key: ManagedBy
          Value: CloudFormation
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            # SkyTunnel bootstrap — all values injected by CloudFormation
            set -euo pipefail

            LOG_FILE="/var/log/skytunnel-bootstrap.log"
            exec > >(tee -a "$LOG_FILE") 2>&1
            echo "=== SkyTunnel bootstrap started at $(date -u) ==="

            signal_failure() {
                echo "ERROR: Bootstrap failed at line $1"
                /opt/aws/bin/cfn-signal --exit-code 1 \
                    --stack ${AWS::StackName} \
                    --resource TunnelServer \
                    --region ${AWS::Region} || true
                exit 1
            }
            trap 'signal_failure $LINENO' ERR

            # --- Pinned versions ---
            IODINE_VERSION="0.8.0"
            HANS_VERSION="1.1"
            CHISEL_VERSION="1.11.5"

            # --- System preparation ---
            echo "--- Installing build dependencies ---"
            dnf groupinstall -y "Development Tools"
            dnf install -y zlib-devel gcc-c++ net-tools jq iptables-services

            echo "--- Loading tun kernel module ---"
            modprobe tun
            echo "tun" > /etc/modules-load.d/tun.conf

            echo "--- Configuring sysctl ---"
            cat > /etc/sysctl.d/99-skytunnel.conf <<'SYSCTL'
            net.ipv4.ip_forward = 1
            net.ipv4.icmp_echo_ignore_all = 0
            SYSCTL
            sysctl --system

            # --- Create directories ---
            mkdir -p /etc/skytunnel /opt/skytunnel

            # --- Build iodine ---
            if [[ ! -x /usr/local/sbin/iodined ]]; then
                echo "--- Building iodine v$IODINE_VERSION ---"
                cd /tmp && rm -rf iodine
                git clone --depth 1 https://github.com/yarrick/iodine.git
                cd iodine
                git fetch --tags
                git checkout "v$IODINE_VERSION" 2>/dev/null || git checkout "$IODINE_VERSION" 2>/dev/null || true
                make -j$(nproc)
                make install
                rm -rf /tmp/iodine
            fi

            # --- Build hans ---
            if [[ ! -x /usr/local/sbin/hans ]]; then
                echo "--- Building hans v$HANS_VERSION ---"
                cd /tmp && rm -rf hans-*
                curl -sSL "https://github.com/friedrich/hans/archive/refs/tags/v$HANS_VERSION.tar.gz" | tar xz
                cd "hans-$HANS_VERSION"
                make -j$(nproc)
                install -m 755 hans /usr/local/sbin/hans
                rm -rf /tmp/hans-*
            fi

            # --- Install chisel ---
            if [[ ! -x /usr/local/bin/chisel ]]; then
                echo "--- Installing chisel v$CHISEL_VERSION ---"
                curl -sSL "https://github.com/jpillora/chisel/releases/download/v1.11.5/chisel_1.11.5_linux_amd64.gz" \
                    | gunzip > /usr/local/bin/chisel
                chmod 755 /usr/local/bin/chisel
            fi

            # --- Environment files ---
            echo "--- Writing service configuration ---"
            TUNNEL_DOMAIN="${TunnelSubdomain}.${DomainName}"
            CHISEL_DOMAIN="${TunnelSubdomain}.${DomainName}"

            cat > /etc/skytunnel/iodine.env <<ENVEOF
            IODINE_PASSWORD=${IodinePassword}
            IODINE_SUBNET=${IodineSubnet}
            IODINE_DOMAIN=$TUNNEL_DOMAIN
            ENVEOF

            cat > /etc/skytunnel/hans.env <<ENVEOF
            HANS_PASSWORD=${HansPassword}
            HANS_SUBNET=${HansSubnet}
            ENVEOF

            cat > /etc/skytunnel/chisel.env <<ENVEOF
            CHISEL_AUTH=${ChiselAuth}
            CHISEL_DOMAIN=$CHISEL_DOMAIN
            TLS_CERT_PATH=/etc/letsencrypt/live/$CHISEL_DOMAIN/fullchain.pem
            TLS_KEY_PATH=/etc/letsencrypt/live/$CHISEL_DOMAIN/privkey.pem
            ENVEOF

            chmod 600 /etc/skytunnel/*.env

            # --- Chisel wrapper script (conditional TLS) ---
            cat > /etc/skytunnel/start-chisel.sh <<'WRAPPER'
            #!/bin/bash
            set -euo pipefail
            source /etc/skytunnel/chisel.env
            CHISEL_ARGS="server --port 443 --socks5 --reverse --auth $CHISEL_AUTH"
            if [[ -f "$TLS_CERT_PATH" && -f "$TLS_KEY_PATH" ]]; then
                CHISEL_ARGS="$CHISEL_ARGS --tls-cert $TLS_CERT_PATH --tls-key $TLS_KEY_PATH"
            fi
            exec /usr/local/bin/chisel $CHISEL_ARGS
            WRAPPER
            chmod 755 /etc/skytunnel/start-chisel.sh

            # --- NAT/masquerade ---
            echo "--- Configuring NAT ---"
            IFACE=$(ip route show default | awk '/default/ {print $5}' | head -1)
            IODINE_NET=$(echo "${IodineSubnet}" | sed 's/\.[0-9]*\//.0\//')
            HANS_NET=$(echo "${HansSubnet}" | sed 's/\.[0-9]*$/.0\/24/')

            for NET in "$IODINE_NET" "$HANS_NET"; do
                if ! iptables -t nat -C POSTROUTING -s "$NET" -o "$IFACE" -j MASQUERADE 2>/dev/null; then
                    iptables -t nat -A POSTROUTING -s "$NET" -o "$IFACE" -j MASQUERADE
                fi
            done

            # Block kernel ICMP echo-replies on public interface (hans needs this)
            # Tunnel interfaces still respond to ping normally
            if ! iptables -C OUTPUT -o "$IFACE" -p icmp --icmp-type echo-reply -j DROP 2>/dev/null; then
                iptables -A OUTPUT -o "$IFACE" -p icmp --icmp-type echo-reply -j DROP
            fi

            iptables-save > /etc/sysconfig/iptables
            systemctl enable iptables

            # --- Systemd units ---
            echo "--- Installing systemd services ---"

            cat > /etc/systemd/system/iodine-server.service <<'UNIT'
            [Unit]
            Description=iodine DNS tunnel server
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            EnvironmentFile=/etc/skytunnel/iodine.env
            ExecStartPre=/sbin/modprobe tun
            ExecStart=/usr/local/sbin/iodined -f -c -P $IODINE_PASSWORD $IODINE_SUBNET $IODINE_DOMAIN
            Restart=on-failure
            RestartSec=5
            LimitNOFILE=65536
            ProtectProc=invisible

            [Install]
            WantedBy=multi-user.target
            UNIT

            cat > /etc/systemd/system/hans-server.service <<'UNIT'
            [Unit]
            Description=hans ICMP tunnel server
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            EnvironmentFile=/etc/skytunnel/hans.env
            ExecStartPre=/sbin/modprobe tun
            ExecStart=/usr/local/sbin/hans -s $HANS_SUBNET -p $HANS_PASSWORD -f -d hans0
            Restart=on-failure
            RestartSec=5
            ProtectProc=invisible

            [Install]
            WantedBy=multi-user.target
            UNIT

            cat > /etc/systemd/system/chisel-server.service <<'UNIT'
            [Unit]
            Description=chisel HTTPS tunnel server
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            EnvironmentFile=/etc/skytunnel/chisel.env
            ExecStart=/etc/skytunnel/start-chisel.sh
            Restart=on-failure
            RestartSec=5
            AmbientCapabilities=CAP_NET_BIND_SERVICE
            NoNewPrivileges=true
            ProtectProc=invisible

            [Install]
            WantedBy=multi-user.target
            UNIT

            systemctl daemon-reload
            systemctl enable --now iodine-server hans-server chisel-server

            # --- Optional Let's Encrypt ---
            if [[ "${EnableLetsEncrypt}" == "true" && -n "${LetsEncryptEmail}" ]]; then
                echo "--- Setting up Let's Encrypt ---"
                dnf install -y certbot
                systemctl stop chisel-server
                certbot certonly --standalone \
                    -d "$CHISEL_DOMAIN" \
                    --email "${LetsEncryptEmail}" \
                    --agree-tos \
                    --non-interactive || echo "WARNING: certbot failed, chisel will run without TLS"
                systemctl start chisel-server

                cat > /etc/systemd/system/certbot-renew.service <<'RENEWSVC'
            [Unit]
            Description=Certbot renewal for SkyTunnel
            [Service]
            Type=oneshot
            ExecStartPre=/bin/systemctl stop chisel-server
            ExecStart=/usr/bin/certbot renew --quiet
            ExecStartPost=/bin/systemctl start chisel-server
            RENEWSVC

                cat > /etc/systemd/system/certbot-renew.timer <<'RENEWTMR'
            [Unit]
            Description=Run certbot renewal twice daily
            [Timer]
            OnCalendar=*-*-* 03,15:00:00
            RandomizedDelaySec=3600
            Persistent=true
            [Install]
            WantedBy=timers.target
            RENEWTMR

                systemctl daemon-reload
                systemctl enable --now certbot-renew.timer
            fi

            # --- Signal success ---
            echo "=== SkyTunnel bootstrap completed at $(date -u) ==="
            /opt/aws/bin/cfn-signal --exit-code 0 \
                --stack ${AWS::StackName} \
                --resource TunnelServer \
                --region ${AWS::Region}

# ============================================================
# Outputs
# ============================================================
Outputs:
  ElasticIP:
    Description: Tunnel server public IP
    Value: !Ref TunnelEIP

  TunnelDomain:
    Description: DNS tunnel domain
    Value: !Sub '${TunnelSubdomain}.${DomainName}'

  NsHostname:
    Description: NS hostname pointing to the server
    Value: !Sub '${NsHostname}.${DomainName}'

  SSHCommand:
    Description: SSH into the tunnel server
    Value: !Sub 'ssh -i <your-key>.pem ec2-user@${TunnelEIP}'

  IodineConnectCommand:
    Description: Connect via DNS tunnel (requires root)
    Value: !Sub >-
      sudo iodine -f -P <password>
      ${NsHostname}.${DomainName}
      ${TunnelSubdomain}.${DomainName}

  HansConnectCommand:
    Description: Connect via ICMP tunnel (requires root)
    Value: !Sub 'sudo hans -c ${TunnelEIP} -p <password> -f'

  ChiselConnectCommand:
    Description: Connect via HTTPS tunnel (SOCKS5 proxy on localhost:1080)
    Value: !Sub 'chisel client --auth <user:password> https://${TunnelSubdomain}.${DomainName}:443 socks'
